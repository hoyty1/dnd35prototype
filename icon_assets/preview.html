<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>D&D Hex RPG Icon Preview</title>
<style>
  body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 30px; }
  h1 { text-align: center; color: #e94560; margin-bottom: 5px; }
  h3 { text-align: center; color: #888; margin-top: 0; font-weight: normal; }
  .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; margin-top: 30px; }
  .card { background: #16213e; border-radius: 12px; padding: 20px; text-align: center; width: 200px; border: 2px solid #0f3460; transition: transform .2s, border-color .2s; }
  .card:hover { transform: scale(1.05); border-color: #e94560; }
  .card img { width: 128px; height: 128px; image-rendering: auto; }
  .card .label { margin-top: 12px; font-size: 14px; font-weight: 600; color: #fff; }
  .card .type { font-size: 11px; margin-top: 4px; padding: 3px 10px; border-radius: 10px; display: inline-block; }
  .pc { background: #0f3460; color: #53a8b6; }
  .enemy { background: #3d0000; color: #e94560; }
  .section { text-align: center; margin: 30px 0 10px; font-size: 20px; color: #53a8b6; }
  .checkerboard { background: repeating-conic-gradient(#2a2a4e 0% 25%, #1e1e3a 0% 50%) 50%/16px 16px; padding: 10px; border-radius: 8px; display: inline-block; }
</style></head><body>
<h1>⚔️ D&D 3.5 Hex RPG — Prototype Icons</h1>
<h3>256×256 RGBA PNGs • Tactical Combat UI Tokens</h3>
<div class="section">🛡️ PC Classes</div>
<div class="grid">
  <div class="card"><div class="checkerboard"><img src="fighter_icon.png"></div><div class="label">Fighter</div><div class="type pc">PC Class</div></div>
  <div class="card"><div class="checkerboard"><img src="rogue_icon.png"></div><div class="label">Rogue</div><div class="type pc">PC Class</div></div>
  <div class="card"><div class="checkerboard"><img src="monk_icon.png"></div><div class="label">Monk</div><div class="type pc">PC Class</div></div>
  <div class="card"><div class="checkerboard"><img src="barbarian_icon.png"></div><div class="label">Barbarian</div><div class="type pc">PC Class</div></div>
</div>
<div class="section">💀 Enemies</div>
<div class="grid">
  <div class="card"><div class="checkerboard"><img src="skeleton_archer_icon.png"></div><div class="label">Skeleton Archer</div><div class="type enemy">Enemy</div></div>
  <div class="card"><div class="checkerboard"><img src="orc_berserker_icon.png"></div><div class="label">Orc Berserker</div><div class="type enemy">Enemy</div></div>
  <div class="card"><div class="checkerboard"><img src="hobgoblin_sergeant_icon.png"></div><div class="label">Hobgoblin Sergeant</div><div class="type enemy">Enemy</div></div>
</div>
</body></html>
